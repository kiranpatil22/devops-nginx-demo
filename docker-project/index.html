<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nginx Server - Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #000000);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 50px 70px;
    text-align: center;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

h1 {
    font-size: 3rem;
    margin-bottom: 20px;
}

h1 span {
    color: #00ffcc;
}

p {
    font-size: 1.2rem;
    margin-bottom: 15px;
    opacity: 0.85;
}

.status {
    margin-top: 25px;
    display: inline-block;
    padding: 12px 30px;
    border-radius: 50px;
    background: linear-gradient(90deg, #00ffcc, #00c3ff);
    color: black;
    font-weight: 600;
    letter-spacing: 1px;
    box-shadow: 0 5px 20px rgba(0,255,204,0.4);
}

.footer {
    margin-top: 30px;
    font-size: 0.85rem;
    opacity: 0.6;
}
</style>

</head>

<body>

<div class="card">
    <h1>🚀 <span>Nginx</span> Server Online</h1>
    <p>Your web server is running successfully.</p>
    <p>Deployed with Docker | Configured on Ubuntu EC2</p>

    <div class="status">
        STATUS: LIVE
    </div>

    <div class="footer">
        Secure • High Performance • Production Ready
    </div>
</div>

</body>
</html>
